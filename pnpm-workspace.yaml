packages:
  - apps/*
  - packages/*
  - tools/*
  - scripts/*

catalogMode: prefer

catalog:
  # 工具链
  "@types/node": ^24
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: 4.1.9
  vite-plus: latest
  tsx: latest # 直接在Node下运行 ts 文件，代替esno的新工具。 执行 scripts 中的命令

  # node 依赖
  tinyglobby: latest # 代替fast-glob 的一个最新的库
  "picocolors": latest # 控制台打印颜色
  "shelljs": latest # 操作文件，执行命令的库

  # 组件库依赖
  "@vue/shared": latest
  "@vue/reactivity": latest
  "@vueuse/core": latest
  nanoid: latest

  # vue 相关
  "@vitejs/plugin-vue": ^6.0.7
  "@vue/tsconfig": latest
  vue-tsc: latest
  vue: latest

  # 样式相关
  less: ^4.6.7
  stylelint: ^17.14.0
  stylelint-config-standard: ^40.0.0
  postcss-less: ^6.0.0

overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
allowBuilds:
  esbuild: false
